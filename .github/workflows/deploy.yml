name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # 或是你使用的主要分支名稱

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Clean and Install
        run: |
          rm -rf node_modules
          npm install

      - name: Build
        run: ./node_modules/.bin/vite build --base=/sdgsfushing/
        env:
          VITE_GOOGLE_APP_SCRIPT_URL: ${{ secrets.VITE_GOOGLE_APP_SCRIPT_URL }}

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          # Vite 預設輸出資料夾為 dist
          path: './dist'

  deploy:
    needs: build_site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
